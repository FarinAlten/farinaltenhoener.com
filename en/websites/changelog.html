<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Farin Altenhöner | Changelog</title>
        <link href="../css/style.css" rel="stylesheet" />
        <link rel="icon" href="../fav-icon.png" type="image/x-icon" />
        <link rel="shortcut icon" href="../fav-icon.png" type="image/x-icon" />
        <script src="../sources/script/js/gtag.js"></script>
    </head>
    <body>
        <noscript>
            <iframe
                src="https://www.googletagmanager.com/ns.html?id=GTM-535RGT8S"
                height="0"
                width="0"
                style="display: none; visibility: hidden"
            >
            </iframe>
        </noscript>

        <nav>
            <div class="nav-container">
                <a class="nav-logo" href="../home.html">
                    <img src="../fav-icon.png" alt="Logo" class="logo-img" />
                </a>
                <div class="nav-links">
                    <a class="nav-link" href="../home.html">Home</a>
                    <a class="nav-link active" href="../websites/projects.html"
                        >Projects</a
                    >
                    <a class="nav-link" href="../websites/contact.html"
                        >Contact</a
                    >
                    <a class="nav-link" href="../websites/blog.html">Blog</a>
                </div>
            </div>
        </nav>

        <main class="content">
            <header class="headerbox">
                <h1 class="title">Changelog</h1>
                <p class="headersubtitle">
                    Here are the latest changes to the site.
                    <strong
                        >Note: To load the Information for this site, data from
                        a Github-Repo is being loaded.</strong
                    >
                </p>
            </header>

            <section class="gallery" id="changelog-container">
                <div class="Box">
                    <h3 class="title">Loading...</h3>
                    <p class="subtitle">fetching latest changes.</p>
                </div>
            </section>
        </main>

        <footer>
            <span>© 2026 Farin Altenhöner</span>
            <div class="footer-links">
                <a href="../websites/legal.html">Legal Information</a>
                <a href="../websites/contact.html">Contact</a>
                <a href="../../de/websites/changelog.html">Deutsche Version</a>
            </div>
        </footer>

        <script>
            async function loadChangelog() {
                const container = document.getElementById(
                    "changelog-container",
                );
                const username = "farinalten";
                const repository = "Farinalten-website";
                const apiUrl = `https://api.github.com/repos/${username}/${repository}/commits`;

                try {
                    const response = await fetch(apiUrl);
                    if (!response.ok) {
                        throw new Error("GitHub API Error");
                    }
                    const commits = await response.json();
                    container.innerHTML = "";

                    commits.forEach((commitData) => {
                        const box = document.createElement("div");
                        box.className = "Box";
                        const commit = commitData.commit;
                        const formattedDate = new Date(
                            commit.author.date,
                        ).toLocaleDateString("de-DE");
                        const commitMessage = commit.message;
                        const author = commit.author.name;

                        box.innerHTML = `
                <h3 class="title">${formattedDate}</h3>
                <p class="subtitle">
                    <strong>${author}</strong><br><br>
                    ${commitMessage.replace(/\n/g, "<br>")}
                </p>
            `;
                        container.appendChild(box);
                    });
                } catch (error) {
                    console.error(error);
                    container.innerHTML = `
            <div class="Box">
                <h3 class="title">Error!</h3>
                <p class="subtitle">The latest changes could not be loaded.</p>
            </div>
        `;
                }
            }
            loadChangelog();
        </script>
    </body>
</html>
